name: OCI A1 Auto Launch

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev

      - name: Create OCI config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Create .env
        run: |
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}" > .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}" >> .env
          echo "OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}" >> .env
          echo "OCI_PRIVATE_KEY_FILENAME=/home/runner/.oci/oci_api_key.pem" >> .env
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> .env
          echo "OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}" >> .env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> .env
          echo "OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}" >> .env
          echo "OCI_OCPUS=4" >> .env
          echo "OCI_MEMORY_IN_GBS=24" >> .env
          echo "OCI_SHAPE=VM.Standard.A1.Flex" >> .env
          echo 'OCI_SSH_PUBLIC_KEY=${{ secrets.OCI_SSH_PUBLIC_KEY }}' >> .env
          echo 'OCI_OPERATING_SYSTEM="Canonical Ubuntu"' >> .env
          echo 'OCI_OPERATING_SYSTEM_VERSION="22.04 Minimal aarch64"' >> .env
      - name: Run
        run: php index.php

name: OCI A1 Auto Launch

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev

      - name: Setup OCI CLI
        run: |
          pip install oci-cli --quiet
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

      - name: Get Image ID
        id: get_image
        run: |
          IMAGE_ID=$(oci compute image list \
            --compartment-id ${{ secrets.OCI_COMPARTMENT_ID }} \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04 Minimal aarch64" \
            --shape VM.Standard.A1.Flex \
            --lifecycle-state AVAILABLE \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --limit 1 \
            --query 'data[0].id' \
            --raw-output)
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Found image: $IMAGE_ID"

      - name: Create .env
        env:
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          config = {
            "OCI_USER_ID": "${{ secrets.OCI_USER_ID }}",
            "OCI_TENANCY_ID": "${{ secrets.OCI_TENANCY_ID }}",
            "OCI_KEY_FINGERPRINT": "${{ secrets.OCI_KEY_FINGERPRINT }}",
            "OCI_PRIVATE_KEY_FILENAME": "/home/runner/.oci/oci_api_key.pem",
            "OCI_REGION": "${{ secrets.OCI_REGION }}",
            "OCI_AVAILABILITY_DOMAIN": "${{ secrets.OCI_AVAILABILITY_DOMAIN }}",
            "OCI_SUBNET_ID": "${{ secrets.OCI_SUBNET_ID }}",
            "OCI_COMPARTMENT_ID": "${{ secrets.OCI_COMPARTMENT_ID }}",
            "OCI_OCPUS": "4",
            "OCI_MEMORY_IN_GBS": "24",
            "OCI_SHAPE": "VM.Standard.A1.Flex",
            "OCI_IMAGE_ID": "${{ steps.get_image.outputs.image_id }}",
            "OCI_SSH_PUBLIC_KEY": os.environ["OCI_SSH_PUBLIC_KEY"],
          }
          with open(".env", "w") as f:
            for k, v in config.items():
              f.write(f'{k}="{v}"\n')
          PYEOF

      - name: Run
        run: php index.php

name: OCI A1 Auto Launch

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev

      - name: Create OCI config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=/home/runner/.oci/oci_api_key.pem
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_OCPUS=4
          OCI_MEMORY_IN_GBS=24
          OCI_SHAPE=VM.Standard.A1.Flex
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          OCI_OPERATING_SYSTEM=Canonical Ubuntu
          OCI_OPERATING_SYSTEM_VERSION=22.04 Minimal aarch64
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run
        run: php index.php
